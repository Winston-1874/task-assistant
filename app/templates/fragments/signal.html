{# Fragment colonne Signal — liste priorisée LLM #}

<div class="p-4 flex flex-col h-full space-y-4">

  <div class="flex items-center justify-between">
    <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-widest">Signal</h3>
    <button
      hx-get="/fragments/signal"
      hx-target="closest aside"
      hx-swap="innerHTML"
      class="p-1 rounded text-gray-300 hover:text-gray-500 hover:bg-gray-100 transition-colors text-xs"
      title="Rafraîchir"
    >↺</button>
  </div>

  {% if priorities %}
  <ol class="space-y-3 flex-1">
    {% for p in priorities %}
    <li class="flex gap-2.5">
      <span class="shrink-0 w-4 h-4 rounded-full bg-gray-100 text-gray-400 text-xs flex items-center justify-center font-medium mt-0.5">{{ loop.index }}</span>
      <div class="min-w-0">
        <p class="text-xs font-medium text-gray-700 leading-snug truncate" title="{{ p.task_title }}">{{ p.task_title }}</p>
        <p class="text-xs text-gray-400 mt-0.5 leading-relaxed">{{ p.reason }}</p>
      </div>
    </li>
    {% endfor %}
  </ol>
  {% else %}
  <div class="flex-1 flex items-start pt-2">
    <p class="text-xs text-gray-300 italic">Aucune priorité générée.</p>
  </div>
  {% endif %}

</div>
