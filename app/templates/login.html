<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Tasks</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-xs">

    <h1 class="text-center text-2xl font-semibold text-gray-800 mb-8 tracking-tight">Tasks</h1>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">

      {% if error %}
      <div class="mb-5 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-5">
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1.5 uppercase tracking-wide" for="password">
            Mot de passe
          </label>
          <input
            type="password"
            id="password"
            name="password"
            autofocus
            required
            autocomplete="current-password"
            class="w-full rounded-lg border border-gray-200 bg-gray-50 px-3 py-2.5 text-sm
                   focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white focus:border-transparent
                   transition-colors"
          >
        </div>
        <button
          type="submit"
          class="w-full rounded-lg bg-blue-600 py-2.5 text-sm font-medium text-white
                 hover:bg-blue-700 active:bg-blue-800 transition-colors"
        >
          Connexion
        </button>
      </form>

    </div>


  </div>

</body>
</html>
